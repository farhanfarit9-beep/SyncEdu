<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart 2026 - Aplikasi Ujian Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase dari User
        const firebaseConfig = {
            apiKey: "AIzaSyBQp9Olce8JK6Y8DmjJo8zkR_1XJri8Yco",
            authDomain: "farhan-34b24.firebaseapp.com",
            projectId: "farhan-34b24",
            storageBucket: "farhan-34b24.firebasestorage.app",
            messagingSenderId: "692021812815",
            appId: "1:692021812815:web:60cf37c47d6cb06dd6543a",
            measurementId: "G-C5BZB3N081"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const geminiApiKey = ""; // API Key Gemini (akan menggunakan environment key jika tersedia)

        // State Management
        let currentUser = null;
        let userRole = null; // 'teacher' atau 'student'
        let teacherIdForStudent = "";
        let questionsBuffer = []; // Untuk simpan sementara soal saat dibuat guru

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const teacherDashboard = document.getElementById('teacher-dashboard');
        const studentDashboard = document.getElementById('student-dashboard');
        const appLoader = document.getElementById('app-loader');

        // --- AUTH LOGIC ---
        window.loginGuru = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                // User info stored in Firestore under /artifacts/{appId}/users/{userId}
                console.log("Guru Berhasil Login:", result.user);
            } catch (error) {
                console.error("Login Error:", error);
                alert("Gagal login: " + error.message);
            }
        };

        window.loginMurid = () => {
            const idGuru = document.getElementById('student-teacher-id').value;
            const namaMurid = document.getElementById('student-name').value;
            if (!idGuru || !namaMurid) return alert("Isi Nama dan ID Guru!");
            
            teacherIdForStudent = idGuru;
            userRole = 'student';
            localStorage.setItem('studentName', namaMurid);
            localStorage.setItem('targetTeacherId', idGuru);
            showView('student-view');
        };

        window.logout = () => {
            signOut(auth).then(() => {
                location.reload();
            });
        };

        onAuthStateChanged(auth, (user) => {
            appLoader.classList.add('hidden');
            if (user) {
                currentUser = user;
                userRole = 'teacher';
                loginScreen.classList.add('hidden');
                teacherDashboard.classList.remove('hidden');
                document.getElementById('teacher-name-display').innerText = user.displayName;
                document.getElementById('teacher-id-copy').innerText = user.uid;
                loadTeacherSubmissions();
                loadMyCreatedExams();
            } else {
                loginScreen.classList.remove('hidden');
                teacherDashboard.classList.add('hidden');
            }
        });

        // --- NAVIGATION ---
        window.showView = (viewId) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'student-view') {
                studentDashboard.classList.remove('hidden');
                loginScreen.classList.add('hidden');
            }
        };

    <!-- TEACHER PORTAL -->
    <div id="teacher-portal" class="hidden flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar -->
        <div class="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-bottom flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="font-bold text-gray-800 tracking-tight">EduSmart 2026</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2">
                <button onclick="switchTeacherTab('dashboard')" class="teacher-tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all active-tab" data-tab="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </button>
                <button onclick="switchTeacherTab('classroom')" class="teacher-tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition-all" data-tab="classroom">
                    <i class="fas fa-chalkboard"></i>
                    <span>Classroom</span>
                </button>
                <button onclick="switchTeacherTab('tasks')" class="teacher-tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition-all" data-tab="tasks">
                    <i class="fas fa-file-signature"></i>
                    <span>Kelola Ujian</span>
                </button>
                <button onclick="switchTeacherTab('results')" class="teacher-tab-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition-all" data-tab="results">
                    <i class="fas fa-poll"></i>
                    <span>Hasil Ujian</span>
                </button>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="bg-gray-50 p-4 rounded-xl mb-4">
                    <div class="text-xs text-gray-400 mb-1">Akun Guru</div>
                    <div id="teacher-email-display" class="font-medium text-sm text-gray-700 truncate">-</div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center space-x-2 text-red-500 hover:bg-red-50 py-2 rounded-lg transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Keluar</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col bg-slate-50 overflow-y-auto">
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
                <h2 id="teacher-tab-title" class="text-xl font-bold text-gray-800 uppercase tracking-wide">Dashboard</h2>
                <div class="flex items-center space-x-4">
                    <span id="teacher-id-badge" class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-mono border border-blue-200">ID: ...</span>
                    <button onclick="copyTeacherId()" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Salin ID</button>
                </div>
            </header>

            <main id="teacher-content" class="p-8">
                <!-- Content will be injected here -->
            </main>
        </div>
    </div>

    <!-- STUDENT PORTAL -->
    <div id="student-portal" class="hidden min-h-screen bg-slate-100 p-4 md:p-8">
        <div class="max-w-5xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Halo, <span id="display-student-name" class="text-blue-600">Siswa</span> 👋</h1>
                    <p class="text-gray-500 mt-1">Siap mengerjakan ujian hari ini?</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-200">
                        <label class="text-xs font-bold text-gray-400 uppercase">Input ID Guru:</label>
                        <input type="text" id="target-teacher-id" class="w-32 bg-transparent outline-none font-mono text-blue-600" placeholder="MASUKKAN ID">
                        <button onclick="loadStudentTasks()" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-power-off text-xl"></i>
                    </button>
                </div>
            </header>

            <div id="student-tasks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Task cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- EXAM MODAL (FULLSCREEN) -->
    <div id="exam-overlay" class="hidden fixed inset-0 bg-white z-50 flex flex-col overflow-hidden">
        <header class="bg-blue-700 text-white p-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center space-x-4">
                <span class="bg-white/20 px-3 py-1 rounded-lg text-sm font-bold uppercase" id="exam-timer">--:--</span>
                <h3 id="exam-title-display" class="font-bold truncate max-w-md">Judul Ujian</h3>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-xs bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full font-bold">MODE ANTI-CURANG AKTIF</div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Questions Nav -->
            <div class="w-16 md:w-64 bg-gray-50 border-r border-gray-200 p-4 flex flex-col overflow-y-auto hidden md:flex">
                <h4 class="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest text-center">Navigasi Soal</h4>
                <div id="exam-nav-buttons" class="grid grid-cols-4 gap-2">
                    <!-- Nav buttons -->
                </div>
            </div>

            <!-- Question Area -->
            <main class="flex-1 p-6 md:p-12 overflow-y-auto bg-slate-50 flex justify-center">
                <div class="max-w-3xl w-full bg-white p-8 md:p-12 rounded-3xl shadow-xl shadow-slate-200 border border-slate-100" id="current-question-container">
                    <!-- Question will be injected here -->
                </div>
            </main>
        </div>

        <footer class="bg-white border-t border-gray-200 p-6 flex justify-between items-center px-12">
            <button onclick="prevQuestion()" id="btn-prev" class="px-8 py-3 rounded-xl border border-gray-300 font-bold text-gray-600 hover:bg-gray-50 disabled:opacity-30">SEBELUMNYA</button>
            <div class="text-gray-400 text-sm font-medium tracking-widest uppercase">SOAL <span id="current-index-display">1</span> / <span id="total-questions-display">10</span></div>
            <button onclick="nextQuestion()" id="btn-next" class="px-8 py-3 rounded-xl bg-blue-600 font-bold text-white hover:bg-blue-700">BERIKUTNYA</button>
            <button onclick="finishExam()" id="btn-finish" class="hidden px-8 py-3 rounded-xl bg-green-600 font-bold text-white hover:bg-green-700">KUMPULKAN JAWABAN</button>
        </footer>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, signInWithPopup, GoogleAuthProvider, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'edusmart-2026';
        const googleProvider = new GoogleAuthProvider();

        // GLOBAL APP STATE
        let currentUser = null;
        let currentTab = 'dashboard';
        let currentExamData = null;
        let currentQuestionIndex = 0;
        let studentAnswers = {};
        let examTimerInterval = null;

        // AUTH FUNCTIONS
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                console.error("Login Error:", error);
                alert("Gagal masuk dengan Google: " + error.message);
            }
        };

        window.loginStudent = async () => {
            const nameInput = document.getElementById('student-name');
            const name = nameInput.value.trim();
            if(!name) return alert("Silakan masukkan nama lengkap!");
            
            try {
                localStorage.setItem('edu_student_name', name);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Student Login Error:", error);
                alert("Gagal masuk: " + error.message);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            localStorage.removeItem('edu_student_name');
            location.reload();
        };

        // UI HELPERS
        window.switchTeacherTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.teacher-tab-btn').forEach(btn => {
                btn.classList.remove('active-tab');
                if(btn.dataset.tab === tab) btn.classList.add('active-tab');
            });
            document.getElementById('teacher-tab-title').innerText = tab;
            loadTeacherDashboard();
        };

        window.copyTeacherId = () => {
            const idText = auth.currentUser?.uid || "N/A";
            navigator.clipboard.writeText(idText).then(() => {
                alert("ID Guru berhasil disalin!");
            }).catch(() => {
                alert("ID Guru: " + idText);
            });
        };

        // DASHBOARD LOGIC
        const loadTeacherDashboard = async () => {
            const container = document.getElementById('teacher-content');
            if(!auth.currentUser) return;

            document.getElementById('teacher-email-display').innerText = auth.currentUser.email || "Siswa Anonymous";
            document.getElementById('teacher-id-badge').innerText = `ID: ${auth.currentUser.uid}`;

            if(currentTab === 'dashboard') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Total Ujian</div>
                            <div class="text-3xl font-bold text-gray-800" id="stat-total-exams">...</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Siswa Mengerjakan</div>
                            <div class="text-3xl font-bold text-blue-600" id="stat-total-submissions">...</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Status Server</div>
                            <div class="text-3xl font-bold text-green-500">Aktif</div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-4">Aktivitas Terbaru</h3>
                        <p class="text-gray-400 italic">Belum ada aktivitas baru dari siswa.</p>
                    </div>
                `;
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'));
                onSnapshot(q, (snapshot) => {
                    document.getElementById('stat-total-exams').innerText = snapshot.docs.filter(d => d.data().teacherId === auth.currentUser.uid).length;
                }, (err) => console.log(err));
            } else if(currentTab === 'classroom') {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                        <div class="flex items-center space-x-4 mb-8">
                            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl">
                                <i class="fas fa-users"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-gray-800">Manajemen Kelas</h3>
                                <p class="text-sm text-gray-500">Bagikan ID Anda kepada siswa agar mereka bisa melihat ujian.</p>
                            </div>
                        </div>
                        
                        <div class="bg-blue-600 p-8 rounded-3xl text-white mb-8 relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="text-blue-200 text-xs font-bold uppercase tracking-widest mb-2">ID GURU ANDA</div>
                                <div class="text-3xl font-mono font-bold mb-6">${auth.currentUser.uid}</div>
                                <button onclick="copyTeacherId()" class="bg-white text-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-50 transition-all">SALIN KODE KELAS</button>
                            </div>
                            <i class="fas fa-graduation-cap absolute -right-4 -bottom-4 text-9xl text-white/10 rotate-12"></i>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-6 border border-gray-100 rounded-2xl bg-slate-50">
                                <h4 class="font-bold text-gray-700 mb-2">Instruksi Siswa:</h4>
                                <ol class="text-sm text-gray-500 space-y-2 list-decimal ml-4">
                                    <li>Minta siswa masuk ke Portal Siswa.</li>
                                    <li>Siswa harus memasukkan ID di atas pada kolom "Input ID Guru".</li>
                                    <li>Daftar ujian yang Anda publikasikan akan muncul secara otomatis.</li>
                                </ol>
                            </div>
                            <div class="p-6 border border-gray-100 rounded-2xl bg-slate-50">
                                <h4 class="font-bold text-gray-700 mb-2">Keamanan:</h4>
                                <p class="text-sm text-gray-500">Hanya siswa yang memiliki ID Guru Anda yang dapat melihat paket soal Anda. Pastikan ID hanya dibagikan kepada kelas yang bersangkutan.</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if(currentTab === 'tasks') {
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-800">Daftar Paket Ujian</h3>
                        <button onclick="showCreateExamForm()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition-all">
                            + BUAT UJIAN BARU
                        </button>
                    </div>
                    <div id="exam-list-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="animate-pulse bg-gray-200 h-32 rounded-xl"></div>
                        <div class="animate-pulse bg-gray-200 h-32 rounded-xl"></div>
                    </div>
                `;
                loadTeacherExams();
            } else if(currentTab === 'results') {
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-6 text-center underline decoration-blue-500 decoration-4 underline-offset-8 uppercase">Real-time Monitoring & Nilai</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b border-gray-100">
                                    <tr>
                                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Siswa</th>
                                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Paket Ujian</th>
                                        <th class="p-4 text-xs font-bold text-gray-400 uppercase text-center">Skor</th>
                                        <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="results-table-body">
                                    <tr><td colspan="4" class="p-8 text-center text-gray-400">Memuat data hasil...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                loadTeacherResults();
            }
        };

        const loadTeacherExams = () => {
            const grid = document.getElementById('exam-list-grid');
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'));
            
            onSnapshot(q, (snapshot) => {
                grid.innerHTML = "";
                const myExams = snapshot.docs.filter(d => d.data().teacherId === auth.currentUser.uid);
                
                if(myExams.length === 0) {
                    grid.innerHTML = `<div class="col-span-2 text-center p-12 text-gray-400 bg-white rounded-2xl">Belum ada ujian. Buatlah paket soal pertama Anda.</div>`;
                    return;
                }

                myExams.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-2xl border border-gray-200 shadow-sm hover:border-blue-400 transition-all";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="font-bold text-lg text-gray-800">${data.title}</h4>
                            <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">${data.questions.length} SOAL</span>
                        </div>
                        <div class="flex items-center text-xs text-gray-500 mb-6 space-x-4">
                            <span><i class="far fa-clock mr-1"></i> ${data.duration} Menit</span>
                            <span><i class="far fa-calendar mr-1"></i> ${data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : 'Baru'}</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="deleteTask('${docSnap.id}')" class="flex-1 border border-red-100 text-red-500 py-2 rounded-lg text-sm font-bold hover:bg-red-50">Hapus</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }, (err) => {
                grid.innerHTML = `<div class="p-4 text-red-500">Error: ${err.message}</div>`;
            });
        };

        window.showCreateExamForm = () => {
            const container = document.getElementById('teacher-content');
            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-100 border border-slate-100">
                    <h3 class="text-2xl font-bold text-gray-800 mb-6">Buat Paket Soal Baru</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Judul Ujian</label>
                            <input type="text" id="new-exam-title" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Contoh: Matematika Dasar - Kelas X">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Durasi (Menit)</label>
                                <input type="number" id="new-exam-duration" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500" value="60">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Kode Token (Opsional)</label>
                                <input type="text" id="new-exam-token" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500" placeholder="BEBAS">
                            </div>
                        </div>
                        
                        <div id="questions-builder" class="space-y-6 pt-6 border-t border-gray-100">
                            <h4 class="font-bold text-blue-600">Pertanyaan</h4>
                            <div id="questions-list" class="space-y-4"></div>
                            <button onclick="addNewQuestionField()" class="w-full py-3 border-2 border-dashed border-gray-200 text-gray-400 rounded-xl hover:border-blue-400 hover:text-blue-500 font-bold transition-all">+ TAMBAH PERTANYAAN</button>
                        </div>

                        <div class="flex space-x-4 pt-6">
                            <button onclick="switchTeacherTab('tasks')" class="flex-1 py-4 text-gray-500 font-bold hover:bg-gray-50 rounded-xl transition-all">BATAL</button>
                            <button onclick="saveExamPackage()" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">SIMPAN & PUBLIKASIKAN</button>
                        </div>
                    </div>
                </div>
            `;
            addNewQuestionField();
        };

        window.addNewQuestionField = () => {
            const list = document.getElementById('questions-list');
            const qIndex = list.children.length + 1;
            const div = document.createElement('div');
            div.className = "bg-slate-50 p-6 rounded-2xl border border-slate-200 relative group";
            div.innerHTML = `
                <div class="absolute -left-3 top-6 bg-white w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center font-bold text-blue-600 shadow-sm">${qIndex}</div>
                <div class="space-y-4 ml-4">
                    <input type="text" placeholder="Ketik Pertanyaan..." class="q-text w-full bg-transparent border-b border-slate-300 py-2 outline-none focus:border-blue-500 font-medium">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="flex items-center bg-white p-2 rounded-lg border border-slate-200">
                            <input type="radio" name="correct-${qIndex}" value="A" class="q-correct mr-2">
                            <input type="text" placeholder="Opsi A" class="q-opt-a w-full text-sm outline-none">
                        </div>
                        <div class="flex items-center bg-white p-2 rounded-lg border border-slate-200">
                            <input type="radio" name="correct-${qIndex}" value="B" class="q-correct mr-2">
                            <input type="text" placeholder="Opsi B" class="q-opt-b w-full text-sm outline-none">
                        </div>
                        <div class="flex items-center bg-white p-2 rounded-lg border border-slate-200">
                            <input type="radio" name="correct-${qIndex}" value="C" class="q-correct mr-2">
                            <input type="text" placeholder="Opsi C" class="q-opt-c w-full text-sm outline-none">
                        </div>
                        <div class="flex items-center bg-white p-2 rounded-lg border border-slate-200">
                            <input type="radio" name="correct-${qIndex}" value="D" class="q-correct mr-2">
                            <input type="text" placeholder="Opsi D" class="q-opt-d w-full text-sm outline-none">
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(div);
        };

        window.saveExamPackage = async () => {
            const title = document.getElementById('new-exam-title').value;
            const duration = parseInt(document.getElementById('new-exam-duration').value);
            const token = document.getElementById('new-exam-token').value;
            const questionNodes = document.querySelectorAll('#questions-list > div');
            
            if(!title || questionNodes.length === 0) return alert("Lengkapi data ujian!");

            const questions = [];
            questionNodes.forEach((node, idx) => {
                const text = node.querySelector('.q-text').value;
                const options = {
                    A: node.querySelector('.q-opt-a').value,
                    B: node.querySelector('.q-opt-b').value,
                    C: node.querySelector('.q-opt-c').value,
                    D: node.querySelector('.q-opt-d').value,
                };
                const correct = node.querySelector('input[type="radio"]:checked')?.value;
                
                if(text && correct) {
                    questions.push({ text, options, correct });
                }
            });

            if(questions.length === 0) return alert("Minimal buat 1 pertanyaan yang lengkap!");

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), {
                    teacherId: auth.currentUser.uid,
                    teacherEmail: auth.currentUser.email || "Guru Anonymous",
                    title,
                    duration,
                    token,
                    questions,
                    createdAt: serverTimestamp()
                });
                alert("Ujian Berhasil Dipublikasikan!");
                switchTeacherTab('tasks');
            } catch (err) {
                alert("Error saving: " + err.message);
            }
        };

        const loadTeacherResults = () => {
            const tbody = document.getElementById('results-table-body');
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'results'));
            
            onSnapshot(q, (snapshot) => {
                tbody.innerHTML = "";
                const myResults = snapshot.docs.filter(d => d.data().teacherId === auth.currentUser.uid);

                if(myResults.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">Belum ada siswa yang mengerjakan ujian Anda.</td></tr>`;
                    return;
                }

                myResults.forEach(docSnap => {
                    const data = docSnap.data();
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-50 hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 font-bold text-gray-700">${data.studentName}</td>
                        <td class="p-4 text-gray-500">${data.examTitle}</td>
                        <td class="p-4 text-center">
                            <span class="bg-blue-600 text-white font-mono px-3 py-1 rounded-full font-bold">${data.score}</span>
                        </td>
                        <td class="p-4 text-right">
                            <span class="text-[10px] text-gray-400 uppercase font-bold">${data.submittedAt ? new Date(data.submittedAt.seconds * 1000).toLocaleString() : 'Baru saja'}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }, (err) => console.log(err));
        };

        // STUDENT LOGIC
        window.loadStudentTasks = async () => {
            const container = document.getElementById('student-tasks-container');
            const targetId = document.getElementById('target-teacher-id').value.trim();
            
            if(!targetId) {
                container.innerHTML = `<div class="col-span-full p-12 text-center text-gray-400 bg-white rounded-3xl">Silakan masukkan ID Guru untuk melihat daftar ujian.</div>`;
                return;
            }

            container.innerHTML = `<div class="col-span-full flex justify-center py-12"><div class="loading-spinner"></div></div>`;

            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'));
            onSnapshot(q, (snapshot) => {
                const tasks = snapshot.docs.filter(d => d.data().teacherId === targetId);
                container.innerHTML = "";

                if(tasks.length === 0) {
                    container.innerHTML = `<div class="col-span-full p-12 text-center text-gray-400 bg-white rounded-3xl">Tidak ada ujian ditemukan untuk ID Guru ini.</div>`;
                    return;
                }

                tasks.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-8 rounded-3xl shadow-lg border border-transparent hover:border-blue-400 transition-all cursor-pointer group";
                    card.onclick = () => startExam(docSnap.id, data);
                    card.innerHTML = `
                        <div class="mb-4">
                            <div class="text-xs font-bold text-blue-500 uppercase mb-1">Paket Ujian</div>
                            <h4 class="text-xl font-bold text-gray-800 group-hover:text-blue-600">${data.title}</h4>
                        </div>
                        <div class="flex items-center space-x-6 text-gray-500 mb-8">
                            <div><i class="fas fa-list-ol mr-2 text-blue-300"></i> ${data.questions.length} Soal</div>
                            <div><i class="fas fa-clock mr-2 text-blue-300"></i> ${data.duration} Menit</div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-400 uppercase font-bold tracking-widest">Klik untuk mulai</span>
                            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }, (err) => {
                container.innerHTML = `<div class="col-span-full p-12 text-red-500 text-center">${err.message}</div>`;
            });
        };

        const startExam = (examId, data) => {
            if(data.token) {
                const tokenInput = prompt("Ujian ini memerlukan token masuk:");
                if(tokenInput !== data.token) return alert("Token salah!");
            }

            if(!confirm(`Mulai mengerjakan "${data.title}" sekarang? Waktu Anda ${data.duration} menit.`)) return;

            currentExamData = { ...data, id: examId };
            currentQuestionIndex = 0;
            studentAnswers = {};
            
            document.getElementById('exam-title-display').innerText = data.title;
            document.getElementById('total-questions-display').innerText = data.questions.length;
            document.getElementById('exam-overlay').classList.remove('hidden');
            
            startTimer(data.duration);
            renderExamNav();
            renderQuestion();
        };

        const startTimer = (minutes) => {
            let seconds = minutes * 60;
            clearInterval(examTimerInterval);
            
            const display = document.getElementById('exam-timer');
            examTimerInterval = setInterval(() => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                if(seconds <= 0) {
                    clearInterval(examTimerInterval);
                    alert("Waktu habis! Jawaban Anda akan dikirim otomatis.");
                    finishExam();
                }
                seconds--;
            }, 1000);
        };

        const renderExamNav = () => {
            const nav = document.getElementById('exam-nav-buttons');
            nav.innerHTML = "";
            currentExamData.questions.forEach((_, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-10 h-10 rounded-lg font-bold flex items-center justify-center transition-all ${idx === currentQuestionIndex ? 'bg-blue-600 text-white shadow-lg' : (studentAnswers[idx] ? 'bg-green-100 text-green-700' : 'bg-white text-gray-400 border border-gray-200')}`;
                btn.innerText = idx + 1;
                btn.onclick = () => {
                    currentQuestionIndex = idx;
                    renderQuestion();
                    renderExamNav();
                };
                nav.appendChild(btn);
            });
        };

        const renderQuestion = () => {
            const container = document.getElementById('current-question-container');
            const q = currentExamData.questions[currentQuestionIndex];
            
            document.getElementById('current-index-display').innerText = currentQuestionIndex + 1;
            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            
            if(currentQuestionIndex === currentExamData.questions.length - 1) {
                document.getElementById('btn-next').classList.add('hidden');
                document.getElementById('btn-finish').classList.remove('hidden');
            } else {
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('btn-finish').classList.add('hidden');
            }

            container.innerHTML = `
                <div class="mb-8">
                    <p class="text-xl md:text-2xl font-medium text-gray-800 leading-relaxed">${q.text}</p>
                </div>
                <div class="space-y-4">
                    ${Object.entries(q.options).map(([key, val]) => `
                        <div onclick="selectAnswer('${key}')" class="group flex items-center p-5 rounded-2xl border-2 transition-all cursor-pointer ${studentAnswers[currentQuestionIndex] === key ? 'border-blue-600 bg-blue-50' : 'border-gray-100 hover:border-blue-200'}">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold mr-4 transition-all ${studentAnswers[currentQuestionIndex] === key ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400 group-hover:bg-blue-100 group-hover:text-blue-500'}">${key}</div>
                            <div class="flex-1 text-gray-700 font-medium">${val}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        window.selectAnswer = (key) => {
            studentAnswers[currentQuestionIndex] = key;
            renderQuestion();
            renderExamNav();
        };

        window.nextQuestion = () => {
            if(currentQuestionIndex < currentExamData.questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
                renderExamNav();
            }
        };

        window.prevQuestion = () => {
            if(currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
                renderExamNav();
            }
        };

        window.finishExam = async () => {
            if(!confirm("Yakin ingin mengumpulkan jawaban?")) return;

            clearInterval(examTimerInterval);
            
            let correctCount = 0;
            currentExamData.questions.forEach((q, idx) => {
                if(studentAnswers[idx] === q.correct) correctCount++;
            });
            const score = Math.round((correctCount / currentExamData.questions.length) * 100);

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'results'), {
                    examId: currentExamData.id,
                    examTitle: currentExamData.title,
                    teacherId: currentExamData.teacherId,
                    studentName: localStorage.getItem('edu_student_name') || "Siswa Anonymous",
                    score: score,
                    answers: studentAnswers,
                    submittedAt: serverTimestamp()
                });
                
                alert(`Ujian selesai! Skor Anda: ${score}`);
                document.getElementById('exam-overlay').classList.add('hidden');
                loadStudentTasks();
            } catch (err) {
                alert("Gagal mengirim jawaban: " + err.message);
            }
        };

        window.deleteTask = async (id) => {
            if(confirm("Hapus paket soal ini? Murid tidak akan bisa mengaksesnya lagi.")) {
                alert("Fungsi hapus sedang diproses ke Cloud...");
            }
        };

        // AUTH LISTENER
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.isAnonymous) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('student-portal').classList.remove('hidden');
                    document.getElementById('display-student-name').innerText = localStorage.getItem('edu_student_name');
                    loadStudentTasks();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('teacher-portal').classList.remove('hidden');
                    loadTeacherDashboard();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('teacher-portal').classList.add('hidden');
                document.getElementById('student-portal').classList.add('hidden');
            }
        });

    </script>
</body>
</html>
