<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart 2026 - Platform Ujian Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, onSnapshot, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase Configuration dari User
        const firebaseConfig = {
            apiKey: "AIzaSyBQp9Olce8JK6Y8DmjJo8zkR_1XJri8Yco",
            authDomain: "farhan-34b24.firebaseapp.com",
            projectId: "farhan-34b24",
            storageBucket: "farhan-34b24.firebasestorage.app",
            messagingSenderId: "692021812815",
            appId: "1:692021812815:web:60cf37c47d6cb06dd6543a",
            measurementId: "G-C5BZB3N081"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const GEMINI_API_KEY = "AIzaSyBHkB-ORUOBh49KEl_2SVPMIxkDCCttReE";

        // Global State
        window.appState = {
            view: 'landing', // landing, teacher_dashboard, student_portal, exam_page
            user: null,
            tasks: [],
            studentResults: [],
            currentStudent: null,
            activeExam: null
        };

        // UI Components Mapper
        const render = () => {
            const root = document.getElementById('root');
            const view = window.appState.view;

            if (view === 'landing') {
                root.innerHTML = LandingPage();
            } else if (view === 'teacher_dashboard') {
                root.innerHTML = TeacherDashboard();
            } else if (view === 'student_portal') {
                root.innerHTML = StudentPortal();
            } else if (view === 'exam_page') {
                root.innerHTML = ExamPage();
            }
            
            attachEventListeners();
        };

        // --- Pages ---

        const LandingPage = () => `
            <div class="min-h-screen bg-blue-50 flex items-center justify-center p-4">
                <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
                    <!-- Left Section -->
                    <div class="md:w-1/2 bg-blue-600 p-12 text-white flex flex-col justify-center">
                        <h1 class="text-5xl font-bold mb-4">EduSmart 2026</h1>
                        <p class="text-blue-100 text-lg mb-8">Platform Ujian Modern berbasis Merdeka Belajar dan Kecerdasan Buatan.</p>
                        <ul class="space-y-4">
                            <li class="flex items-center gap-3"><span class="bg-blue-500 p-1 rounded-full">✓</span> Otomasi Soal dengan AI Gemini</li>
                            <li class="flex items-center gap-3"><span class="bg-blue-500 p-1 rounded-full">✓</span> Penilaian Akurat Versi 2026</li>
                            <li class="flex items-center gap-3"><span class="bg-blue-500 p-1 rounded-full">✓</span> Sistem Keamanan Anti-Curang</li>
                        </ul>
                    </div>
                    <!-- Right Section (Login) -->
                    <div class="md:w-1/2 p-12 flex flex-col justify-center">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-bold text-gray-800">Selamat Datang</h2>
                            <p class="text-gray-500">Pilih akses masuk Anda</p>
                        </div>
                        
                        <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 border border-gray-300 py-3 rounded-xl hover:bg-gray-50 transition mb-6">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                            <span class="font-medium">Masuk Sebagai Guru (Google)</span>
                        </button>

                        <div class="relative mb-6">
                            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500 uppercase">Atau Murid</span></div>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-semibold text-gray-500 uppercase">Nama Lengkap</label>
                                <input type="text" id="student-name" placeholder="Contoh: Ahmad Fauzi" class="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-gray-500 uppercase">ID GURU</label>
                                <input type="text" id="teacher-id-input" placeholder="Masukkan ID dari Guru Anda" class="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <button id="btn-student-entry" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition">MASUK UJIAN</button>
                        </div>
                        <p class="text-center text-xs text-gray-400 mt-8">© 2026 EduSmart Platform. Versi 2.4.0</p>
                    </div>
                </div>
            </div>
        `;

        const TeacherDashboard = () => {
            const user = window.appState.user;
            return `
            <div class="min-h-screen bg-gray-50 flex">
                <!-- Sidebar -->
                <div class="w-64 bg-white border-r flex flex-col">
                    <div class="p-6 border-b flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">E</div>
                        <div>
                            <h2 class="font-bold text-gray-800">Teacher Portal</h2>
                            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">EduSmart Premium</p>
                        </div>
                    </div>
                    <nav class="flex-1 p-4 space-y-2">
                        <button class="w-full flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-medium"><i data-lucide="home" class="w-5"></i> Beranda</button>
                        <button id="btn-show-create-task" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition"><i data-lucide="plus-circle" class="w-5"></i> Buat Tugas Baru</button>
                        <button id="btn-show-results" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition"><i data-lucide="file-text" class="w-5"></i> Hasil Kerja Murid</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Integrasi</div>
                        <button onclick="window.open('https://meet.google.com/new')" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition"><i data-lucide="video" class="w-5"></i> Google Meet</button>
                        <button onclick="window.open('https://classroom.google.com')" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition"><i data-lucide="graduation-cap" class="w-5"></i> Classroom</button>
                    </nav>
                    <div class="p-4 border-t">
                        <button id="btn-logout" class="w-full flex items-center justify-center gap-2 text-red-500 p-2 hover:bg-red-50 rounded-lg transition"><i data-lucide="log-out" class="w-4"></i> Logout</button>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="flex-1 overflow-auto">
                    <header class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                        <h2 class="text-xl font-bold text-gray-800" id="dashboard-title">Dashboard Guru</h2>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-sm font-bold text-gray-800">${user.displayName}</p>
                                <p class="text-[10px] text-gray-400">ID: <span id="copy-id" class="cursor-pointer hover:text-blue-500 font-mono">${user.uid}</span></p>
                            </div>
                            <img src="${user.photoURL}" class="w-10 h-10 rounded-full border">
                            <button id="btn-copy-id-icon" class="p-2 hover:bg-gray-100 rounded-lg text-blue-500"><i data-lucide="copy" class="w-4"></i></button>
                        </div>
                    </header>

                    <main class="p-8" id="dashboard-content">
                        <!-- Default: Stats & Cards -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg shadow-blue-200 relative overflow-hidden group">
                                <div class="relative z-10">
                                    <p class="text-sm opacity-80">Total Soal Dibuat</p>
                                    <h3 class="text-4xl font-bold mt-1" id="stat-tasks">0</h3>
                                </div>
                                <i data-lucide="list-checks" class="absolute right-6 top-6 w-12 h-12 opacity-20 group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative group">
                                <p class="text-sm text-gray-400">Menunggu Diperiksa</p>
                                <h3 class="text-4xl font-bold mt-1 text-emerald-500" id="stat-pending">0</h3>
                                <i data-lucide="clock" class="absolute right-6 top-6 w-12 h-12 text-emerald-100"></i>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative group">
                                <p class="text-sm text-gray-400">Murid Terdaftar</p>
                                <h3 class="text-4xl font-bold mt-1 text-orange-500" id="stat-students">0</h3>
                                <i data-lucide="users" class="absolute right-6 top-6 w-12 h-12 text-orange-100"></i>
                            </div>
                        </div>

                        <div class="flex justify-between items-end mb-6">
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Riwayat Paket Soal</h4>
                            <button id="btn-create-task-2" class="text-blue-600 text-sm font-bold flex items-center gap-1 hover:underline"><i data-lucide="plus" class="w-4"></i> Buat Baru</button>
                        </div>

                        <div id="task-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Tasks will be injected here -->
                            <div class="col-span-full py-12 text-center text-gray-400 italic">Belum ada paket soal yang dibuat.</div>
                        </div>
                    </main>
                </div>
            </div>
            `;
        };

        const StudentPortal = () => {
            const { currentStudent, activeExam } = window.appState;
            return `
            <div class="min-h-screen bg-gray-50 p-6">
                <div class="max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-2xl font-bold text-blue-800">EduSmart Murid</h1>
                        <button id="btn-student-logout" class="text-sm text-red-500 hover:underline">Ganti Akun</button>
                    </div>

                    <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl mb-8 relative overflow-hidden">
                        <div class="relative z-10">
                            <h2 class="text-3xl font-bold mb-2">Halo, ${currentStudent.name}!</h2>
                            <p class="text-blue-100 mb-6">Masukkan ID Guru untuk mulai melihat tugas yang tersedia.</p>
                            <button id="btn-refresh-tasks" class="bg-white text-blue-600 px-6 py-3 rounded-xl font-bold hover:bg-blue-50 transition shadow-lg">Refresh Daftar Tugas</button>
                        </div>
                    </div>

                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Tugas Tersedia</h3>
                    <div id="student-task-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- List of tasks from current teacher ID -->
                        <div class="col-span-full py-8 text-center text-gray-400">Gunakan ID Guru yang valid untuk melihat tugas.</div>
                    </div>
                </div>
            </div>
            `;
        };

        const ExamPage = () => {
            const { activeExam } = window.appState;
            return `
                <div class="min-h-screen bg-white flex flex-col">
                    <header class="bg-blue-600 p-6 text-white flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold">${activeExam.title}</h2>
                            <p class="text-xs opacity-80">${activeExam.subject} | Kelas ${activeExam.grade}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs uppercase font-bold">Waktu Tersisa</p>
                            <p class="text-2xl font-mono">∞:∞</p>
                        </div>
                    </header>
                    <main class="flex-1 p-8 overflow-auto max-w-3xl mx-auto w-full">
                        <div id="exam-questions-container" class="space-y-12">
                            <!-- Questions -->
                        </div>
                        <div class="mt-12 pt-8 border-t flex justify-center">
                            <button id="btn-submit-exam" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-xl">Kumpulkan Jawaban</button>
                        </div>
                    </main>
                </div>
            `;
        };

        // --- Logic & Database Handlers ---

        const attachEventListeners = () => {
            lucide.createIcons();
            
            // Login Handlers
            const loginBtn = document.getElementById('btn-login-google');
            if (loginBtn) loginBtn.onclick = async () => {
                try {
                    const result = await signInWithPopup(auth, provider);
                    window.appState.user = result.user;
                    window.appState.view = 'teacher_dashboard';
                    render();
                    loadTeacherData();
                } catch (e) { console.error(e); }
            };

            const studentBtn = document.getElementById('btn-student-entry');
            if (studentBtn) studentBtn.onclick = () => {
                const name = document.getElementById('student-name').value;
                const tid = document.getElementById('teacher-id-input').value;
                if (!name || !tid) return alert("Isi nama dan ID guru!");
                window.appState.currentStudent = { name, teacherId: tid };
                window.appState.view = 'student_portal';
                render();
                loadStudentTasks(tid);
            };

            const logoutBtn = document.getElementById('btn-logout');
            if (logoutBtn) logoutBtn.onclick = () => {
                signOut(auth).then(() => {
                    window.appState.view = 'landing';
                    render();
                });
            };

            const studentLogout = document.getElementById('btn-student-logout');
            if (studentLogout) studentLogout.onclick = () => {
                window.appState.view = 'landing';
                render();
            };

            // Teacher Actions
            const showCreateTask = document.getElementById('btn-show-create-task');
            const showCreateTask2 = document.getElementById('btn-create-task-2');
            if (showCreateTask || showCreateTask2) {
                const fn = () => renderCreateTask();
                if (showCreateTask) showCreateTask.onclick = fn;
                if (showCreateTask2) showCreateTask2.onclick = fn;
            }

            const showResults = document.getElementById('btn-show-results');
            if (showResults) showResults.onclick = () => renderTeacherResults();

            const copyIdBtn = document.getElementById('btn-copy-id-icon');
            if (copyIdBtn) copyIdBtn.onclick = () => {
                navigator.clipboard.writeText(window.appState.user.uid);
                alert("ID Guru disalin ke clipboard!");
            };
        };

        const renderCreateTask = () => {
            const container = document.getElementById('dashboard-content');
            document.getElementById('dashboard-title').innerText = "Buat Tugas Baru";
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl border shadow-sm">
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Judul Tugas</label>
                            <input id="new-task-title" type="text" placeholder="Contoh: Ulangan Harian BAB 1" class="w-full border p-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Mata Pelajaran</label>
                            <select id="new-task-subject" class="w-full border p-3 rounded-xl">
                                <option>Matematika</option>
                                <option>IPA</option>
                                <option>IPS</option>
                                <option>Pai</option>
                                <option>Bhs Indonesia</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Kelas</label>
                            <input id="new-task-grade" type="text" placeholder="Contoh: 6C" class="w-full border p-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Gunakan AI Gemini (Otomatis)</label>
                            <button id="btn-gemini-ai" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition">
                                <i data-lucide="sparkles" class="w-4"></i> Buat Soal Otomatis (Gemini)
                            </button>
                        </div>
                    </div>

                    <hr class="mb-8">

                    <div id="questions-builder" class="space-y-6">
                        <!-- Questions listed here -->
                    </div>

                    <div class="mt-8 flex gap-4">
                        <button id="btn-add-pg" class="flex-1 border-2 border-dashed border-blue-200 text-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-50 transition flex flex-col items-center">
                            <i data-lucide="list" class="w-6 mb-1"></i> + Pilihan Ganda
                        </button>
                        <button id="btn-add-essay" class="flex-1 border-2 border-dashed border-emerald-200 text-emerald-600 py-4 rounded-2xl font-bold hover:bg-emerald-50 transition flex flex-col items-center">
                            <i data-lucide="align-left" class="w-6 mb-1"></i> + Esai
                        </button>
                    </div>

                    <div class="mt-12 flex justify-end">
                        <button id="btn-save-task" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-xl transition">SIMPAN DAN BAGIKAN</button>
                    </div>
                </div>
            `;
            lucide.createIcons();

            let questions = [];

            const addPG = () => {
                const id = Date.now();
                questions.push({ id, type: 'pg', question: '', options: ['', '', '', ''], correct: 0 });
                renderQuestions();
            };

            const addEssay = () => {
                const id = Date.now();
                questions.push({ id, type: 'essay', question: '', answerKey: '' });
                renderQuestions();
            };

            const renderQuestions = () => {
                const builder = document.getElementById('questions-builder');
                builder.innerHTML = questions.map((q, i) => `
                    <div class="p-6 bg-gray-50 rounded-2xl border relative">
                        <button onclick="removeQuestion(${q.id})" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5"></i></button>
                        <p class="text-xs font-bold text-blue-600 mb-4">SOAL NO ${i + 1} (${q.type.toUpperCase()})</p>
                        <textarea oninput="updateQ(${q.id}, 'question', this.value)" placeholder="Tulis soal di sini..." class="w-full border p-4 rounded-xl mb-4 h-24">${q.question}</textarea>
                        
                        ${q.type === 'pg' ? `
                            <div class="grid grid-cols-2 gap-4">
                                ${q.options.map((opt, oi) => `
                                    <div class="flex items-center gap-2">
                                        <input type="radio" name="correct-${q.id}" ${q.correct === oi ? 'checked' : ''} onchange="updateQ(${q.id}, 'correct', ${oi})">
                                        <input type="text" oninput="updateOpt(${q.id}, ${oi}, this.value)" value="${opt}" placeholder="Pilihan ${String.fromCharCode(65 + oi)}" class="flex-1 border p-3 rounded-xl text-sm">
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <textarea oninput="updateQ(${q.id}, 'answerKey', this.value)" placeholder="Kunci jawaban atau poin evaluasi..." class="w-full border p-4 rounded-xl text-sm h-20">${q.answerKey}</textarea>
                        `}
                    </div>
                `).join('');
                lucide.createIcons();
            };

            window.removeQuestion = (id) => { questions = questions.filter(q => q.id !== id); renderQuestions(); };
            window.updateQ = (id, field, val) => { const q = questions.find(q => q.id === id); q[field] = val; };
            window.updateOpt = (id, optIndex, val) => { const q = questions.find(q => q.id === id); q.options[optIndex] = val; };

            document.getElementById('btn-add-pg').onclick = addPG;
            document.getElementById('btn-add-essay').onclick = addEssay;

            document.getElementById('btn-gemini-ai').onclick = async () => {
                const subj = document.getElementById('new-task-subject').value;
                const btn = document.getElementById('btn-gemini-ai');
                btn.innerHTML = '<span class="animate-spin">🌀</span> Sedang merancang soal...';
                
                try {
                    const prompt = `Buatlah 5 soal ujian ${subj} untuk kelas ${document.getElementById('new-task-grade').value} dalam format JSON. 
                                   Format: [{"type": "pg", "question": "...", "options": ["A","B","C","D"], "correct": 0}, {"type": "essay", "question": "..."}]. 
                                   Hanya JSON saja, jangan berikan teks pembuka atau penutup.`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    let rawText = data.candidates[0].content.parts[0].text;
                    // Cleaning response from markdown blocks if any
                    rawText = rawText.replace(/```json|```/g, '').trim();
                    const aiQuestions = JSON.parse(rawText);
                    
                    questions = [...questions, ...aiQuestions.map(q => ({ ...q, id: Date.now() + Math.random() }))];
                    renderQuestions();
                } catch (e) {
                    console.error(e);
                    alert("AI gagal memproses permintaan. Pastikan topik sudah diisi.");
                } finally {
                    btn.innerHTML = '<i data-lucide="sparkles" class="w-4"></i> Buat Soal Otomatis (Gemini)';
                    lucide.createIcons();
                }
            };

            document.getElementById('btn-save-task').onclick = async () => {
                const title = document.getElementById('new-task-title').value;
                const subject = document.getElementById('new-task-subject').value;
                const grade = document.getElementById('new-task-grade').value;

                if (!title || questions.length === 0) return alert("Judul dan minimal 1 soal harus ada.");

                const taskData = {
                    teacherId: window.appState.user.uid,
                    teacherName: window.appState.user.displayName,
                    title,
                    subject,
                    grade,
                    questions,
                    createdAt: new Date().toISOString()
                };

                const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), taskData);
                alert("Tugas Berhasil Disimpan!");
                window.appState.view = 'teacher_dashboard';
                render();
                loadTeacherData();
            };
        };

        const loadTeacherData = async () => {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), where("teacherId", "==", window.appState.user.uid));
            
            onSnapshot(q, (snapshot) => {
                const tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.appState.tasks = tasks;
                
                const container = document.getElementById('task-list-container');
                const statTasks = document.getElementById('stat-tasks');
                
                if (statTasks) statTasks.innerText = tasks.length;
                
                if (container) {
                    if (tasks.length === 0) {
                        container.innerHTML = `<div class="col-span-full py-12 text-center text-gray-400 italic">Belum ada paket soal yang dibuat.</div>`;
                    } else {
                        container.innerHTML = tasks.map(t => `
                            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm flex justify-between items-center group hover:border-blue-200 transition">
                                <div>
                                    <h4 class="font-bold text-gray-800">${t.title}</h4>
                                    <p class="text-xs text-gray-400">${t.subject} • Kelas ${t.grade} • ${t.questions.length} Soal</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="downloadTask('${t.id}')" class="p-2 text-gray-400 hover:text-blue-600"><i data-lucide="download" class="w-5"></i></button>
                                    <button onclick="deleteTask('${t.id}')" class="p-2 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5"></i></button>
                                </div>
                            </div>
                        `).join('');
                        lucide.createIcons();
                    }
                }
            }, (error) => console.error(error));

            // Load Student Results count
            const q2 = query(collection(db, 'artifacts', appId, 'public', 'data', 'results'), where("teacherId", "==", window.appState.user.uid));
            onSnapshot(q2, (snapshot) => {
                const results = snapshot.docs.map(doc => doc.data());
                const statPending = document.getElementById('stat-pending');
                const statStudents = document.getElementById('stat-students');
                if (statPending) statPending.innerText = results.filter(r => r.score === null).length;
                if (statStudents) statStudents.innerText = new Set(results.map(r => r.studentName)).size;
            }, (error) => console.error(error));
        };

        window.deleteTask = async (id) => {
            if (!confirm("Hapus paket soal ini?")) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
        };

        window.downloadTask = (id) => {
            const task = window.appState.tasks.find(t => t.id === id);
            const content = JSON.stringify(task, null, 2);
            const blob = new Blob([content], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `EduSmart-Soal-${task.title.replace(/\s+/g, '-')}.json`;
            a.click();
        };

        const renderTeacherResults = async () => {
            const container = document.getElementById('dashboard-content');
            document.getElementById('dashboard-title').innerText = "Hasil Kerja Murid";
            
            container.innerHTML = `
                <div class="bg-white p-8 rounded-3xl border shadow-sm">
                    <div class="flex flex-col md:flex-row gap-4 mb-8 items-end">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Filter Mata Pelajaran</label>
                            <input type="text" id="filter-subj" placeholder="Misal: Pai" class="w-full border p-3 rounded-xl">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Filter Kelas</label>
                            <input type="text" id="filter-class" placeholder="Misal: 6C" class="w-full border p-3 rounded-xl">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Filter Tanggal</label>
                            <input type="date" id="filter-date" class="w-full border p-3 rounded-xl">
                        </div>
                        <button id="btn-apply-filter" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold">Cari Data</button>
                        <button id="btn-print-results" class="bg-blue-100 text-blue-600 px-6 py-3 rounded-xl font-bold flex items-center gap-2"><i data-lucide="printer" class="w-4"></i> Cetak</button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-xs font-bold text-gray-400 uppercase border-b">
                                    <th class="py-4 px-2">Murid</th>
                                    <th>Mata Pelajaran</th>
                                    <th>Kelas</th>
                                    <th>Tanggal & Waktu</th>
                                    <th>Status</th>
                                    <th>Nilai</th>
                                    <th class="text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body">
                                <tr><td colspan="7" class="py-8 text-center text-gray-400">Pencarian sedang disiapkan...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();

            const loadTable = async () => {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'results'), where("teacherId", "==", window.appState.user.uid));
                
                const snapshot = await getDoc(q); // Manual fetch for filtering
                // Firestore simple query limitations: we fetch all and filter in JS
                onSnapshot(q, (sn) => {
                    let results = sn.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    const fSubj = document.getElementById('filter-subj').value.toLowerCase();
                    const fClass = document.getElementById('filter-class').value.toLowerCase();
                    const fDate = document.getElementById('filter-date').value;

                    if (fSubj) results = results.filter(r => r.subject.toLowerCase().includes(fSubj));
                    if (fClass) results = results.filter(r => r.grade.toLowerCase().includes(fClass));
                    if (fDate) results = results.filter(r => r.submittedAt.startsWith(fDate));

                    const tbody = document.getElementById('results-table-body');
                    tbody.innerHTML = results.map(r => {
                        const date = new Date(r.submittedAt);
                        const dateStr = date.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
                        const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                        
                        return `
                        <tr class="border-b hover:bg-gray-50 transition">
                            <td class="py-4 px-2 font-bold text-gray-800">${r.studentName}</td>
                            <td class="text-sm">${r.subject}</td>
                            <td class="text-sm font-mono">${r.grade}</td>
                            <td class="text-[10px]">
                                <div class="font-bold">${dateStr}</div>
                                <div class="text-gray-400">${timeStr} WIB</div>
                            </td>
                            <td>
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${r.score !== null ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'}">
                                    ${r.score !== null ? 'Selesai' : 'Perlu Diperiksa'}
                                </span>
                            </td>
                            <td class="font-bold text-lg ${r.score >= 75 ? 'text-blue-600' : 'text-red-500'}">${r.score !== null ? r.score : '-'}</td>
                            <td class="text-right">
                                <button onclick="inspectResult('${r.id}')" class="bg-blue-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold uppercase tracking-wider">Periksa</button>
                            </td>
                        </tr>
                        `;
                    }).join('');
                });
            };

            document.getElementById('btn-apply-filter').onclick = loadTable;
            document.getElementById('btn-print-results').onclick = () => window.print();
            loadTable();
        };

        window.inspectResult = async (resId) => {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'results', resId);
            const resSnap = await getDoc(docRef);
            const data = resSnap.data();

            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl border shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h2 class="text-2xl font-bold">${data.studentName}</h2>
                            <p class="text-sm text-gray-400">Pekerjaan: ${data.title} (${data.subject})</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs uppercase font-bold text-gray-400">Total Soal</p>
                            <p class="text-2xl font-bold">${data.answers.length}</p>
                        </div>
                    </div>

                    <div class="space-y-8">
                        ${data.answers.map((ans, i) => `
                            <div class="p-6 bg-gray-50 rounded-2xl border">
                                <p class="text-xs font-bold text-blue-600 mb-2">SOAL NO ${i + 1}</p>
                                <p class="mb-4 font-medium">${ans.question}</p>
                                <div class="bg-white p-4 rounded-xl border border-blue-100">
                                    <p class="text-xs font-bold text-gray-400 uppercase mb-1">Jawaban Murid:</p>
                                    <p class="text-gray-800">${ans.studentAnswer}</p>
                                </div>
                                ${ans.correctAnswer ? `
                                    <div class="mt-2 text-xs">
                                        <span class="text-emerald-600 font-bold">Kunci: ${ans.correctAnswer}</span>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-12 bg-blue-50 p-8 rounded-3xl border border-blue-100">
                        <h4 class="font-bold text-blue-800 mb-4">Penilaian Merdeka Belajar 2026</h4>
                        <div class="flex items-center gap-6">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Input Nilai (0-100)</label>
                                <input type="number" id="input-score" value="${data.score || 0}" class="w-full text-3xl font-bold border p-4 rounded-2xl outline-none focus:ring-4 focus:ring-blue-200">
                            </div>
                            <button id="btn-save-score" class="bg-blue-600 text-white px-8 py-6 rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700 transition">SIMPAN NILAI</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('btn-save-score').onclick = async () => {
                const score = parseInt(document.getElementById('input-score').value);
                await updateDoc(docRef, { score: score });
                alert("Nilai berhasil disimpan sesuai standar Merdeka Belajar 2026!");
                renderTeacherResults();
            };
        };

        const loadStudentTasks = async (teacherId) => {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), where("teacherId", "==", teacherId));
            
            onSnapshot(q, (sn) => {
                const tasks = sn.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const container = document.getElementById('student-task-list');
                
                if (tasks.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-8 text-center text-gray-400">Guru ini belum membagikan tugas apa pun.</div>`;
                    return;
                }

                container.innerHTML = tasks.map(t => `
                    <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm flex flex-col justify-between hover:shadow-md transition">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">${t.subject}</span>
                                <span class="text-[10px] text-gray-400 font-mono">ID: ${t.id.substring(0,6)}</span>
                            </div>
                            <h4 class="text-xl font-bold text-gray-800 mb-2">${t.title}</h4>
                            <p class="text-sm text-gray-500 mb-6">Paket soal untuk Kelas ${t.grade}. Terdiri dari ${t.questions.length} butir pertanyaan.</p>
                        </div>
                        <button onclick="startExam('${t.id}')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">KERJAKAN TUGAS</button>
                    </div>
                `).join('');
            }, (error) => {
                alert("ID Guru tidak valid atau database error.");
            });
        };

        window.startExam = (taskId) => {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-smart-2026';
            const q = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', taskId);
            
            getDoc(q).then(snap => {
                const data = snap.data();
                window.appState.activeExam = { id: snap.id, ...data };
                window.appState.view = 'exam_page';
                render();

                const container = document.getElementById('exam-questions-container');
                container.innerHTML = data.questions.map((q, i) => `
                    <div class="question-item" data-id="${q.id}" data-type="${q.type}">
                        <div class="flex gap-4 mb-4">
                            <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold flex-shrink-0">${i+1}</span>
                            <p class="text-lg text-gray-800 leading-relaxed font-medium">${q.question}</p>
                        </div>
                        ${q.type === 'pg' ? `
                            <div class="ml-12 grid grid-cols-1 gap-3">
                                ${q.options.map((opt, oi) => `
                                    <label class="flex items-center gap-3 p-4 border rounded-2xl cursor-pointer hover:bg-blue-50 transition border-gray-200">
                                        <input type="radio" name="ans-${q.id}" value="${oi}" class="w-5 h-5 accent-blue-600">
                                        <span class="text-gray-700">${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="ml-12">
                                <textarea name="ans-${q.id}" placeholder="Ketik jawaban esai Anda di sini..." class="w-full border-2 border-gray-200 p-6 rounded-3xl h-48 focus:border-blue-600 outline-none transition text-gray-700"></textarea>
                            </div>
                        `}
                    </div>
                `).join('');

                document.getElementById('btn-submit-exam').onclick = async () => {
                    if (!confirm("Yakin ingin mengumpulkan jawaban?")) return;
                    
                    const answers = data.questions.map(q => {
                        const input = document.querySelector(`[name="ans-${q.id}"]:checked`) || document.querySelector(`textarea[name="ans-${q.id}"]`);
                        let studentAnswer = "";
                        let isCorrect = null;

                        if (q.type === 'pg') {
                            const val = input ? parseInt(input.value) : -1;
                            studentAnswer = val === -1 ? "(Tidak Dijawab)" : q.options[val];
                            isCorrect = val === q.correct;
                        } else {
                            studentAnswer = input ? input.value : "(Tidak Dijawab)";
                        }

                        return {
                            question: q.question,
                            type: q.type,
                            studentAnswer,
                            isCorrect,
                            correctAnswer: q.type === 'pg' ? q.options[q.correct] : null
                        };
                    });

                    // Auto-calculate PG score
                    const pgQuestions = answers.filter(a => a.type === 'pg');
                    const correctCount = pgQuestions.filter(a => a.isCorrect).length;
                    const autoScore = pgQuestions.length > 0 ? Math.round((correctCount / pgQuestions.length) * 100) : null;

                    const resultData = {
                        teacherId: data.teacherId,
                        studentName: window.appState.currentStudent.name,
                        title: data.title,
                        subject: data.subject,
                        grade: data.grade,
                        answers: answers,
                        score: autoScore, // Initial score based on PG, Teacher can override
                        submittedAt: new Date().toISOString()
                    };

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'results'), resultData);
                    alert("Tugas berhasil dikumpulkan! Nilai Anda akan segera diperiksa oleh Guru.");
                    window.appState.view = 'student_portal';
                    render();
                    loadStudentTasks(data.teacherId);
                };
            });
        };

        // Initialize App
        window.onload = () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.appState.user = user;
                    window.appState.view = 'teacher_dashboard';
                    loadTeacherData();
                } else {
                    window.appState.view = 'landing';
                }
                render();
            });
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            .no-print { display: none; }
            body { background: white; }
            .shadow-sm, .shadow-xl { box-shadow: none !important; border: 1px solid #eee; }
        }
    </style>
</head>
<body class="bg-blue-50 text-slate-900">
    <div id="root">
        <!-- Content dynamicly loaded -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="animate-pulse flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl mb-4"></div>
                <p class="text-blue-600 font-bold">EduSmart 2026 sedang memuat...</p>
            </div>
        </div>
    </div>
</body>
</html>
