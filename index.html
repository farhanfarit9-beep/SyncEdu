<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart 2026 - Platform Ujian Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .gradient-blue {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            .no-print { display: none; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, getDocs, query, 
            addDoc, onSnapshot, updateDoc, deleteDoc, where, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (Sesuai kode Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyBQp9Olce8JK6Y8DmjJo8zkR_1XJri8Yco",
            authDomain: "farhan-34b24.firebaseapp.com",
            projectId: "farhan-34b24",
            storageBucket: "farhan-34b24.firebasestorage.app",
            messagingSenderId: "692021812815",
            appId: "1:692021812815:web:60cf37c47d6cb06dd6543a",
            measurementId: "G-C5BZB3N081"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const geminiApiKey = "AIzaSyBHkB-ORUOBh49KEl_2SVPMIxkDCCttReE";
        const appId = "edu-smart-2026";

        // Application State
        let state = {
            user: null,
            role: null, // 'teacher' | 'student'
            currentView: 'login',
            tempQuestions: [],
            teacherTasks: [],
            studentSubmissions: [],
            activeExam: null,
            filters: {
                date: '',
                month: '',
                year: '',
                all: true
            }
        };

        // --- Core Functions ---

        window.loginTeacher = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                state.user = result.user;
                state.role = 'teacher';
                renderDashboard();
                showToast("Berhasil login sebagai Guru", "success");
            } catch (error) {
                showToast("Gagal Login: " + error.message, "error");
            }
        };

        window.loginStudent = async () => {
            const name = document.getElementById('student-name').value;
            const tId = document.getElementById('teacher-id').value;
            
            if (!name || !tId) {
                return showToast("Lengkapi Nama dan ID Guru", "error");
            }

            state.role = 'student';
            state.user = { uid: 'std_' + Math.random().toString(36).substr(2, 9), displayName: name };
            state.teacherIdForStudent = tId;
            
            // Verifikasi ID Guru
            const teacherRef = doc(db, "artifacts", appId, "public", "teachers", tId);
            const snap = await getDoc(teacherRef);
            
            renderStudentDashboard();
            showToast("Selamat datang, " + name, "success");
        };

        window.logout = () => {
            signOut(auth).then(() => {
                state.user = null;
                state.role = null;
                renderLogin();
            });
        };

        // --- AI Gemini Integration ---
        window.generateAIQuestions = async () => {
            const mapel = document.getElementById('ai-mapel').value;
            const kelas = document.getElementById('ai-kelas').value;
            
            if(!mapel || !kelas) return showToast("Isi Mapel dan Kelas terlebih dahulu", "error");

            const btn = document.getElementById('ai-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin">🌀</span> AI sedang merancang soal...`;

            const prompt = `Buatkan 5 soal pilihan ganda untuk mata pelajaran ${mapel} kelas ${kelas} dalam format JSON murni. 
            Format: [{"question": "string", "options": ["A", "B", "C", "D"], "answerIndex": 0}]. 
            Pastikan JSON valid dan jangan tambahkan teks penjelasan lain.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let textResult = data.candidates[0].content.parts[0].text;
                // Clean markdown if present
                textResult = textResult.replace(/```json/g, "").replace(/```/g, "").trim();
                
                const parsedQuestions = JSON.parse(textResult);
                state.tempQuestions = parsedQuestions.map(q => ({
                    ...q,
                    id: Math.random().toString(36).substr(2, 9),
                    type: 'PG'
                }));

                showToast("AI berhasil membuat soal!", "success");
                updateQueueUI();
            } catch (error) {
                console.error(error);
                showToast("Gagal memproses AI. Silakan coba manual.", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        // --- UI Rendering ---

        function renderLogin() {
            document.getElementById('main-container').innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row w-full max-w-5xl h-[600px]">
                        <!-- Left Panel (Blue) -->
                        <div class="md:w-1/2 gradient-blue p-12 text-white flex flex-col justify-center relative overflow-hidden">
                            <div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                            <div class="absolute bottom-[-10%] left-[-10%] w-64 h-64 bg-black/10 rounded-full blur-3xl"></div>
                            
                            <div class="relative z-10">
                                <h1 class="text-5xl font-extrabold mb-6">EduSmart 2026</h1>
                                <p class="text-blue-100 text-lg mb-10 leading-relaxed">Platform Ujian Modern berbasis Kurikulum Merdeka Belajar dan Kecerdasan Buatan.</p>
                                
                                <ul class="space-y-4">
                                    <li class="flex items-center gap-3">
                                        <div class="bg-white/20 p-2 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                        <span class="font-medium">Otomasi Soal dengan AI Gemini</span>
                                    </li>
                                    <li class="flex items-center gap-3">
                                        <div class="bg-white/20 p-2 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                        <span class="font-medium">Penilaian Akurat Versi 2026</span>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <!-- Right Panel (Login Form) -->
                        <div class="md:w-1/2 p-12 flex flex-col justify-center bg-white">
                            <div class="max-w-sm mx-auto w-full">
                                <h2 class="text-3xl font-bold text-slate-800 mb-2">Selamat Datang</h2>
                                <p class="text-slate-500 mb-8 font-medium">Pilih akses masuk Anda</p>

                                <button onclick="loginTeacher()" class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-3.5 rounded-2xl hover:bg-slate-50 transition-all font-bold text-slate-700 mb-6 group">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                                    Masuk Sebagai Guru (Google)
                                </button>

                                <div class="relative mb-8">
                                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                                    <div class="relative flex justify-center text-xs uppercase tracking-widest font-bold text-slate-400 bg-white px-4">Atau Murid</div>
                                </div>

                                <div class="space-y-4">
                                    <div class="relative">
                                        <input id="student-name" type="text" placeholder="Nama Lengkap Murid" class="w-full pl-4 pr-4 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
                                    </div>
                                    <div class="relative">
                                        <input id="teacher-id" type="text" placeholder="ID Guru (Dari Guru Anda)" class="w-full pl-4 pr-4 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium font-mono text-sm">
                                    </div>
                                    <button onclick="loginStudent()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-900 shadow-xl shadow-slate-200 transition-all">Masuk Ujian</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function renderDashboard() {
            // Save teacher profile for student lookup
            await setDoc(doc(db, "artifacts", appId, "public", "teachers", state.user.uid), {
                name: state.user.displayName,
                id: state.user.uid,
                email: state.user.email
            });

            document.getElementById('main-container').innerHTML = `
                <div class="min-h-screen flex bg-[#f8fafc]">
                    <!-- Sidebar -->
                    <aside class="w-72 bg-white border-r hidden lg:flex flex-col p-8 space-y-8 sticky top-0 h-screen">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 gradient-blue rounded-xl flex items-center justify-center text-white font-black italic">E</div>
                            <h2 class="text-2xl font-extrabold text-blue-600 italic tracking-tight">EduSmart</h2>
                        </div>

                        <nav class="flex-1 space-y-1">
                            <button onclick="switchTeacherView('home')" class="nav-btn active w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all">
                                🏠 <span>Beranda</span>
                            </button>
                            <button onclick="switchTeacherView('create')" class="nav-btn w-full flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">
                                ➕ <span>Buat Tugas Baru</span>
                            </button>
                            <button onclick="switchTeacherView('reports')" class="nav-btn w-full flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">
                                📊 <span>Hasil Kerja Murid</span>
                            </button>
                            <a href="https://meet.google.com/new" target="_blank" class="w-full flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">
                                🎥 <span>Zoom / Google Meet</span>
                            </a>
                        </nav>

                        <div class="pt-6 border-t space-y-4">
                            <div class="p-4 bg-blue-50 rounded-2xl">
                                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">ID GURU ANDA</p>
                                <div class="flex items-center justify-between">
                                    <code class="text-xs font-mono font-bold text-blue-700 truncate mr-2">${state.user.uid}</code>
                                    <button onclick="copyTeacherId()" class="text-blue-500 hover:scale-110 transition-transform">📋</button>
                                </div>
                            </div>
                            
                            <!-- Riwayat Soal Saya (Sidebar) -->
                            <div class="space-y-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">RIWAYAT SOAL SAYA</p>
                                <div id="sidebar-history" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2 text-xs">
                                    <!-- Dynamic content -->
                                </div>
                            </div>

                            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 text-red-500 font-bold p-4 hover:bg-red-50 rounded-2xl transition-all">
                                🚪 Keluar
                            </button>
                        </div>
                    </aside>

                    <!-- Content -->
                    <main class="flex-1 overflow-y-auto p-4 lg:p-12">
                        <header class="flex justify-between items-center mb-10">
                            <div>
                                <h1 class="text-3xl font-extrabold text-slate-800">Halo, ${state.user.displayName.split(' ')[0]}! 👋</h1>
                                <p class="text-slate-500 font-medium">Teacher Portal &bull; EduSmart v2.0</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right hidden sm:block">
                                    <p class="font-bold text-slate-800 leading-none">${state.user.displayName}</p>
                                    <p class="text-xs text-slate-400 font-medium mt-1">ID: ${state.user.uid.substr(0,8)}...</p>
                                </div>
                                <img src="${state.user.photoURL}" class="w-14 h-14 rounded-2xl border-4 border-white shadow-lg">
                            </div>
                        </header>

                        <div id="teacher-content" class="space-y-8">
                            <!-- View content dynamically inserted here -->
                        </div>
                    </main>
                </div>
            `;
            loadSidebarHistory();
            switchTeacherView('home');
        }

        window.switchTeacherView = (view) => {
            const container = document.getElementById('teacher-content');
            
            // UI Active State Sidebar
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600');
                btn.classList.add('text-slate-500');
            });

            if (view === 'home') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl shadow-blue-100">
                            <p class="text-blue-100 font-bold uppercase text-[10px] tracking-widest mb-2">Total Tugas</p>
                            <h3 id="stat-tasks" class="text-4xl font-black">0</h3>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-2">Murid Mengerjakan</p>
                            <h3 id="stat-subs" class="text-4xl font-black text-slate-800">0</h3>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-2">Rata-rata Nilai</p>
                            <h3 id="stat-avg" class="text-4xl font-black text-slate-800">0</h3>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold">Aktivitas Terkini</h2>
                            <button onclick="switchTeacherView('reports')" class="text-blue-600 font-bold text-sm">Lihat Semua &rarr;</button>
                        </div>
                        <div id="recent-activity" class="space-y-4">
                            <!-- Load activity -->
                        </div>
                    </div>
                `;
                loadHomeStats();
            } else if (view === 'create') {
                container.innerHTML = `
                    <div class="max-w-4xl space-y-8">
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <h2 class="text-2xl font-extrabold mb-8 flex items-center gap-3">
                                <span class="p-3 bg-blue-50 rounded-2xl text-xl">📝</span> Informasi Mata Pelajaran
                            </h2>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Mata Pelajaran</label>
                                    <input id="ai-mapel" type="text" placeholder="Contoh: PAI" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Kelas</label>
                                    <input id="ai-kelas" type="text" placeholder="Contoh: 6C" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Judul Tugas</label>
                                    <input id="ai-judul" type="text" placeholder="Contoh: Ujian Tengah Semester" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                            </div>

                            <button id="ai-btn" onclick="generateAIQuestions()" class="w-full gradient-blue text-white py-5 rounded-[1.5rem] font-extrabold shadow-xl shadow-blue-100 hover:scale-[1.01] transition-transform flex items-center justify-center gap-3 text-lg">
                                🤖 Buat Tugas Otomatis AI (Gemini)
                            </button>

                            <div class="relative py-12">
                                <div class="absolute inset-0 flex items-center"><div class="w-full border-t-2 border-dashed border-slate-100"></div></div>
                                <div class="relative flex justify-center"><span class="px-6 bg-white text-slate-400 font-bold text-sm uppercase tracking-[0.3em]">Atau Manual</span></div>
                            </div>

                            <div class="space-y-6">
                                <div class="flex gap-4">
                                    <select id="q-type" onchange="toggleManualInputs()" class="p-4 bg-slate-50 rounded-2xl font-bold outline-none border-r-[16px] border-transparent">
                                        <option value="PG">Pilihan Ganda (PG)</option>
                                        <option value="ESAI">Esai</option>
                                    </select>
                                    <textarea id="q-text" placeholder="Tulis soal Anda di sini..." class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-medium h-20 resize-none"></textarea>
                                </div>

                                <div id="pg-inputs" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border-2 border-transparent focus-within:border-blue-200">
                                        <span class="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-bold text-slate-400 shadow-sm text-xs">A</span>
                                        <input id="opt-0" type="text" placeholder="Pilihan Jawaban A" class="bg-transparent w-full outline-none font-medium">
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border-2 border-transparent focus-within:border-blue-200">
                                        <span class="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-bold text-slate-400 shadow-sm text-xs">B</span>
                                        <input id="opt-1" type="text" placeholder="Pilihan Jawaban B" class="bg-transparent w-full outline-none font-medium">
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border-2 border-transparent focus-within:border-blue-200">
                                        <span class="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-bold text-slate-400 shadow-sm text-xs">C</span>
                                        <input id="opt-2" type="text" placeholder="Pilihan Jawaban C" class="bg-transparent w-full outline-none font-medium">
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border-2 border-transparent focus-within:border-blue-200">
                                        <span class="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-bold text-slate-400 shadow-sm text-xs">D</span>
                                        <input id="opt-3" type="text" placeholder="Pilihan Jawaban D" class="bg-transparent w-full outline-none font-medium">
                                    </div>
                                    <div class="sm:col-span-2">
                                        <select id="correct-opt" class="w-full p-4 bg-green-50 text-green-700 font-bold rounded-2xl outline-none appearance-none cursor-pointer">
                                            <option value="0">Jawaban Benar: Opsi A</option>
                                            <option value="1">Jawaban Benar: Opsi B</option>
                                            <option value="2">Jawaban Benar: Opsi C</option>
                                            <option value="3">Jawaban Benar: Opsi D</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="flex gap-4 pt-4">
                                    <button onclick="addManualQuestion()" class="flex-1 bg-white border-2 border-blue-600 text-blue-600 py-4 rounded-2xl font-extrabold hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
                                        💾 Simpan & Lanjut
                                    </button>
                                    <button onclick="saveAllQuestions()" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-extrabold hover:bg-slate-900 shadow-lg shadow-slate-200 transition-all flex items-center justify-center gap-2">
                                        🚀 Publikasikan Tugas
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-bold">Daftar Soal Antrean</h3>
                                <div class="bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full text-xs font-black uppercase">
                                    <span id="queue-count">0</span> Soal Ready
                                </div>
                            </div>
                            <div id="preview-area" class="space-y-4">
                                <p class="text-slate-400 text-center py-10 font-medium italic">Belum ada soal yang ditambahkan.</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (view === 'reports') {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 min-h-[600px]">
                        <div class="flex flex-col lg:flex-row justify-between lg:items-center gap-6 mb-10">
                            <h2 class="text-2xl font-extrabold">Evaluasi Hasil Kerja Murid</h2>
                            
                            <div class="flex flex-wrap items-center gap-3">
                                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                    <input type="date" id="filter-date" class="bg-transparent text-sm font-bold p-2 outline-none">
                                    <select id="filter-month" class="bg-transparent text-sm font-bold p-2 outline-none border-l px-3">
                                        <option value="">Bulan (Semua)</option>
                                        <option value="01">Januari</option><option value="02">Februari</option>
                                        <option value="03">Maret</option><option value="04">April</option>
                                        <option value="05">Mei</option><option value="06">Juni</option>
                                        <option value="07">Juli</option><option value="08">Agustus</option>
                                        <option value="09">September</option><option value="10">Oktober</option>
                                        <option value="11">November</option><option value="12">Desember</option>
                                    </select>
                                    <input type="number" id="filter-year" placeholder="2026" class="bg-transparent text-sm font-bold p-2 outline-none border-l w-20 px-3">
                                </div>
                                <button onclick="applyFilters()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:shadow-lg transition-all">Terapkan Filter</button>

        window.toggleManualInputs = () => {

            if (pgInputs) pgInputs.style.display = type === 'PG' ? 'grid' : 'none';
        };

        window.addManualQuestion = () => {
            const type = document.getElementById('q-type').value;
            const text = document.getElementById('q-text').value;
            if(!text) return showToast("Soal tidak boleh kosong", "error");

            let question = { id: Date.now().toString(), type, question: text };
            if (type === 'PG') {
                question.options = [
                    document.getElementById('opt-0').value || "Opsi A",
                    document.getElementById('opt-1').value || "Opsi B",
                    document.getElementById('opt-2').value || "Opsi C",
                    document.getElementById('opt-3').value || "Opsi D"
                ];
                question.answerIndex = parseInt(document.getElementById('correct-opt').value);
            }

            state.tempQuestions.push(question);
            document.getElementById('q-text').value = '';
            updateQueueUI();
            showToast("Soal ditambahkan ke antrean", "success");
        };

        function updateQueueUI() {
            const preview = document.getElementById('preview-area');
            const count = document.getElementById('queue-count');
            if (!preview || !count) return;

            count.innerText = state.tempQuestions.length;
            
            if (state.tempQuestions.length === 0) {
                preview.innerHTML = `<p class="text-slate-400 text-center py-10 font-medium italic">Belum ada soal yang ditambahkan.</p>`;
                return;
            }

            preview.innerHTML = state.tempQuestions.map((q, idx) => `
                <div class="group flex items-start justify-between bg-slate-50 p-6 rounded-3xl border border-transparent hover:border-blue-100 transition-all">
                    <div class="flex gap-4">

                            ${idx + 1}
                        </div>
                        <div class="space-y-2">
                            <p class="font-bold text-slate-800">${q.question}</p>
                            <div class="flex gap-2">

                                ${q.type === 'PG' ? `<span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-black uppercase">Jawaban: ${String.fromCharCode(65 + q.answerIndex)}</span>` : ''}

            state.tempQuestions.splice(idx, 1);

        window.saveAllQuestions = async () => {
            const mapel = document.getElementById('ai-mapel').value;
            const kelas = document.getElementById('ai-kelas').value;
            const judul = document.getElementById('ai-judul').value;

            if(!mapel || !kelas || !judul) return showToast("Harap lengkapi informasi Mapel, Kelas, dan Judul", "error");
            if(state.tempQuestions.length === 0) return showToast("Antrean soal masih kosong", "error");

            try {
                const taskRef = doc(collection(db, "artifacts", appId, "public", "tasks"));
                const now = new Date();
                await setDoc(taskRef, {
                    teacherId: state.user.uid,
                    teacherName: state.user.displayName,
                    mapel, kelas, judul,
                    questions: state.tempQuestions,
                    createdAt: now.toISOString(),
                    monthYear: `${now.getMonth() + 1}/${now.getFullYear()}`,
                    dateOnly: now.toISOString().split('T')[0]
                });

                showToast("Tugas berhasil dipublikasikan!", "success");
                state.tempQuestions = [];
                switchTeacherView('home');
                loadSidebarHistory();
            } catch (error) {
                showToast("Gagal mempublikasikan tugas", "error");
            }
        };

        // --- Data Fetching ---

        async function loadHomeStats() {
            const tasksSnap = await getDocs(query(collection(db, "artifacts", appId, "public", "tasks")));
            const subsSnap = await getDocs(query(collection(db, "artifacts", appId, "public", "submissions")));
            
            let myTasks = 0;
            let mySubs = 0;
            let totalScore = 0;
            let subCount = 0;
            let recentHtml = '';

            tasksSnap.forEach(t => { if(t.data().teacherId === state.user.uid) myTasks++; });
            subsSnap.forEach(s => { 
                const data = s.data();

                    mySubs++;

                        totalScore += data.score;
                        subCount++;

                                    <p class="font-bold text-slate-700">${data.studentName}</p>

                            </div>
                        </td>
                        <td class="p-6">
                            <p class="font-bold text-slate-600">${data.mapel}</p>

                        </td>

        }

        window.startExam = async (id) => {
            const docRef = doc(db, "artifacts", appId, "public", "tasks", id);
            const snap = await getDoc(docRef);
            const task = snap.data();
            state.activeExam = { ...task, id };

            document.getElementById('main-container').innerHTML = `
                <div class="min-h-screen bg-slate-50 p-4 lg:p-12">
                    <div class="max-w-3xl mx-auto space-y-10">
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                            <div>
                                <h1 class="text-2xl font-extrabold text-slate-800">${task.judul}</h1>
                                <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">${task.mapel} &bull; ${task.questions.length} Soal</p>
                            </div>
                            <div id="exam-timer" class="p-4 bg-red-50 text-red-600 rounded-2xl font-black text-xl">2026</div>
                        </div>

                        <form id="exam-form" class="space-y-8">
                            ${task.questions.map((q, idx) => `
                                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                                    <div class="flex items-start gap-4">
                                        <div class="w-8 h-8 bg-slate-100 text-slate-400 rounded-xl flex items-center justify-center text-xs font-black shrink-0">${idx+1}</div>
                                        <h3 class="text-xl font-bold text-slate-800 leading-relaxed">${q.question}</h3>
                                    </div>

                                    ${q.type === 'PG' ? `
                                        <div class="grid gap-3">
                                            ${q.options.map((opt, oIdx) => `
                                                <label class="flex items-center gap-4 p-4 rounded-2xl border-2 border-slate-50 hover:border-blue-200 cursor-pointer transition-all has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500">
                                                    <input type="radio" name="q-${idx}" value="${opt}" class="w-5 h-5 accent-blue-600" required>
                                                    <span class="font-bold text-slate-700">${opt}</span>
                                                </label>
                                            `).join('')}
                                        </div>
                                    ` : `
                                        <textarea name="q-${idx}" placeholder="Ketik jawaban esai Anda di sini..." class="w-full p-6 bg-slate-50 rounded-[1.5rem] h-48 outline-none focus:ring-2 focus:ring-blue-500 font-medium" required></textarea>
                                    `}
                                </div>
                            `).join('')}

                            <div class="pt-10">
                                <button type="submit" class="w-full gradient-blue text-white py-6 rounded-[2rem] font-black text-2xl shadow-2xl shadow-blue-200 hover:scale-[1.01] transition-transform">Kumpulkan Hasil Ujian 🚀</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            window.scrollTo(0,0);

            document.getElementById('exam-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.submitter;
                btn.disabled = true;
                btn.innerHTML = "Memproses Pengiriman...";

                const formData = new FormData(e.target);
                const answers = [];
                
                task.questions.forEach((q, idx) => {
                    const ans = formData.get(`q-${idx}`);
                    answers.push({
                        question: q.question,
                        userAnswer: ans,
                        type: q.type,
                        correctAnswer: q.type === 'PG' ? q.options[q.answerIndex] : null,
                        isCorrect: q.type === 'PG' ? (ans === q.options[q.answerIndex]) : null
                    });
                });

                try {
                    await addDoc(collection(db, "artifacts", appId, "public", "submissions"), {
                        taskId: id,
                        teacherId: task.teacherId,
                        studentName: state.user.displayName,
                        mapel: task.mapel,
                        kelas: task.kelas,
                        answers: answers,
                        totalQuestions: task.questions.length,
                        createdAt: new Date().toISOString()
                    });

                        ${data.answers.map((ans, idx) => `

            `;

        window.saveFinalEvaluation = async (subId, count) => {
            let total = 0;
            for(let i=0; i<count; i++) {
                total += parseInt(document.getElementById(`score-input-${i}`).value || 0);
            }
            const average = Math.round(total / count);

            try {
                await updateDoc(doc(db, "artifacts", appId, "public", "submissions", subId), {
                    score: average,
                    evaluatedAt: new Date().toISOString()
                });
                showToast(`Nilai tersimpan: ${average}`, "success");
                document.querySelector('.fixed').remove();
                loadFullReports();
                loadHomeStats();
            } catch (error) {
                showToast("Gagal menyimpan nilai", "error");
            }
        };

        window.downloadSpecificTask = async (id) => {
            const snap = await getDoc(doc(db, "artifacts", appId, "public", "tasks", id));
            const task = snap.data();
            
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();

            docPdf.setFontSize(22);
            docPdf.text("EduSmart 2026 - Lembar Soal", 105, 20, { align: 'center' });
            
            docPdf.setFontSize(12);
            docPdf.text(`Mata Pelajaran : ${task.mapel}`, 20, 40);
            docPdf.text(`Kelas          : ${task.kelas}`, 20, 47);
            docPdf.text(`Judul Tugas    : ${task.judul}`, 20, 54);
            docPdf.text(`Guru           : ${task.teacherName}`, 20, 61);
            docPdf.line(20, 68, 190, 68);

            let y = 80;
            task.questions.forEach((q, idx) => {
                if (y > 270) { docPdf.addPage(); y = 20; }
                docPdf.setFont(undefined, 'bold');
                docPdf.text(`${idx + 1}. ${q.question}`, 20, y);
                y += 10;
                
                docPdf.setFont(undefined, 'normal');
                if(q.type === 'PG') {
                    q.options.forEach((opt, i) => {
                        docPdf.text(`${String.fromCharCode(65+i)}. ${opt}`, 25, y);
                        y += 7;
                    });
                } else {
                    y += 15; // Space for writing
                }
                y += 5;
            });

            docPdf.save(`Soal_${task.mapel}_${task.kelas}.pdf`);
            showToast("PDF Berhasil di-generate", "success");
        };

        // --- Global Utils ---

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold shadow-2xl z-[100] flex items-center gap-3 animate-in fade-in slide-in-from-bottom-10 duration-300 ${type === 'success' ? 'bg-slate-800' : 'bg-red-500'}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        window.copyTeacherId = () => {
            const id = state.user.uid;
            navigator.clipboard.writeText(id).then(() => showToast("ID Guru disalin ke clipboard", "success"));
        };

        // Start
        onAuthStateChanged(auth, (user) => {
            if (user && state.role === 'teacher') {
                state.user = user;
                renderDashboard();
            } else if (!state.user) {
                renderLogin();
            }
        });

    </script>
</head>
<body class="bg-[#f8fafc] text-slate-800 selection:bg-blue-100">
    <div id="main-container">
        <!-- Dashboard Loading -->
        <div class="h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-black text-blue-600 italic tracking-widest uppercase text-sm">Menghubungkan ke EduSmart...</p>
            </div>
        </div>
    </div>
</body>
</html>
